name: Précalcul distances piéton/voiture (OSRM)

# Tourne en tâche de fond, jamais sur une requête visiteur. Long (le
# service OSRM public limite à 1 req/s) — lance sur un département à
# la fois si besoin de contrôler la durée.
on:
  workflow_dispatch:
    inputs:
      lieu_id:
        description: "ID d'un seul lieu (laisser vide pour tout traiter)"
        required: false
        default: ""
      departement:
        description: "Un département précis (laisser vide pour tout traiter)"
        required: false
        default: ""

jobs:
  precalcul:
    runs-on: ubuntu-latest
    timeout-minutes: 180
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install asyncpg httpx python-dotenv
      - name: Précalculer les distances
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          if [ -n "${{ github.event.inputs.lieu_id }}" ]; then
            python enrich_itineraires.py --lieu-id ${{ github.event.inputs.lieu_id }}
          elif [ -n "${{ github.event.inputs.departement }}" ]; then
            python enrich_itineraires.py --departement "${{ github.event.inputs.departement }}"
          else
            python enrich_itineraires.py
          fi
