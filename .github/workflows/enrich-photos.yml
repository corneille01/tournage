name: Enrichissement photos des commodités (Wikimedia Commons)

# Léger et séparé du remplissage Overpass. Deux cibles possibles :
# "commodites" (rang 1 par catégorie, en complément d'Overpass) ou
# "lieux" (lieux_tournage, en complément de wikidata_ingest.py). Se
# relance sans risque (ne retraite que ce qui manque encore).
on:
  workflow_dispatch:
    inputs:
      lieu_id:
        description: "ID d'un seul élément à traiter (laisser vide pour tous)"
        required: false
        default: ""
      cible:
        description: "Quoi traiter"
        required: true
        type: choice
        default: "commodites"
        options:
          - commodites
          - lieux
          - tous

jobs:
  enrichissement-photos:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Installer les dépendances
        run: pip install asyncpg httpx python-dotenv

      - name: Chercher les photos manquantes sur Wikimedia Commons
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          if [ -n "${{ github.event.inputs.lieu_id }}" ]; then
            python enrich_photos.py --lieu-id ${{ github.event.inputs.lieu_id }} --cible ${{ github.event.inputs.cible }}
          else
            python enrich_photos.py --cible ${{ github.event.inputs.cible }}
          fi
