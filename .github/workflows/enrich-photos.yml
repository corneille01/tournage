name: Enrichissement photos des commodités (Wikimedia Commons)

# Léger et séparé du remplissage Overpass — ne cherche une photo que
# pour les commodités "rang 1" (la plus proche par catégorie) qui n'en
# ont pas encore. Se relance sans risque (ne retraite que celles qui
# manquent encore), donc pas besoin d'automatisation régulière : à la
# demande, après chaque nouveau remplissage Overpass.
on:
  workflow_dispatch:
    inputs:
      lieu_id:
        description: "ID d'un seul lieu à traiter (laisser vide pour tous)"
        required: false
        default: ""

jobs:
  enrichissement-photos:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Installer les dépendances
        run: pip install asyncpg httpx python-dotenv

      - name: Chercher les photos manquantes sur Wikimedia Commons
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          if [ -n "${{ github.event.inputs.lieu_id }}" ]; then
            python enrich_photos.py --lieu-id ${{ github.event.inputs.lieu_id }}
          else
            python enrich_photos.py
          fi
