name: Remplissage Overpass — 2 départements restants (temporaire)

# Ne reste que Pyrénées-Orientales et Gard — les 3 autres (Aude,
# Haute-Garonne, Hérault) ont fini avec succès la dernière fois. Le
# regroupement par coordonnées a bien aidé (Gard était à 20/21 lieux
# quand le timeout a coupé) mais ces deux départements restent trop
# volumineux pour 90 min — timeout remonté à 180 min pour être large.
on:
  workflow_dispatch: {}

jobs:
  remplissage-2-departements:
    runs-on: ubuntu-latest
    timeout-minutes: 180
    strategy:
      fail-fast: false
      max-parallel: 2
      matrix:
        departement:
          - "Pyrénées-Orientales"
          - "Gard"
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install asyncpg httpx python-dotenv
      - name: Remplir amenity_cache / amenity_stats — ${{ matrix.departement }}
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: python refresh_cache.py --departement "${{ matrix.departement }}"

