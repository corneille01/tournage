name: Remplissage Overpass — Pyrénées-Orientales seul (temporaire)

# Dernier département bloquant. Lancé SEUL (pas en parallèle avec un
# autre) pour ne pas doubler la pression sur Overpass au même moment,
# avec un timeout large (300 min, proche du maximum GitHub) vu le
# volume de tentatives 429/504 observées sur ce département précis.
on:
  workflow_dispatch: {}

jobs:
  remplissage-pyrenees-orientales:
    runs-on: ubuntu-latest
    timeout-minutes: 300
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install asyncpg httpx python-dotenv
      - name: Remplir amenity_cache / amenity_stats — Pyrénées-Orientales
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: python refresh_cache.py --departement "Pyrénées-Orientales"
