name: Rafraîchissement hebdomadaire Wikidata

# Se déclenche tous les lundis à 6h UTC, ou manuellement (bouton "Run
# workflow"). Tourne sur les serveurs GitHub — contourne le pare-feu
# université qui bloque le port Postgres (5432) en sortie, et se
# connecte directement à Neon (Render/Neon → pas de restriction entre
# eux). Toujours en statut='brouillon' : rien ne se publie sans
# validation manuelle.
on:
  schedule:
    - cron: '0 6 * * 1'
  workflow_dispatch: {}

jobs:
  ingestion:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Installer les dépendances
        run: pip install httpx python-dotenv asyncpg

      - name: Lancer l'ingestion Wikidata directement vers Neon
        env:
          TMDB_API_KEY: ${{ secrets.TMDB_API_KEY }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: python wikidata_ingest.py
