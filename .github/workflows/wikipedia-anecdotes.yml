name: Anecdotes de tournage (Wikipédia)

# Publie automatiquement pour les films à un seul lieu, affiche pour
# répartition manuelle les films à plusieurs lieux (voir les logs du
# job pour ces cas-là et fais l'UPDATE toi-même dans Neon).
on:
  workflow_dispatch:
    inputs:
      film_id:
        description: "ID d'un seul film à traiter (laisser vide pour tous)"
        required: false
        default: ""

jobs:
  anecdotes:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Installer les dépendances
        run: pip install asyncpg httpx python-dotenv

      - name: Récupérer les anecdotes depuis Wikipédia
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          if [ -n "${{ github.event.inputs.film_id }}" ]; then
            python wikipedia_anecdotes.py --film-id ${{ github.event.inputs.film_id }}
          else
            python wikipedia_anecdotes.py
          fi
