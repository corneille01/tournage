<!doctype html>
<html lang="fr">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, viewport-fit=cover"
    />
    <title>CinéTour — Visitez les lieux de tournage en Occitanie</title>
    <meta
      name="description"
      content="Découvrez où ont été tournés vos films, séries et animés préférés en Occitanie, et tout ce qu'il faut pour visiter : hébergements, restaurants, offices de tourisme, transports."
    />

    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#0f1115" />
    <link rel="stylesheet" href="/style.css" />
    <link rel="stylesheet" href="/vendor/leaflet/leaflet.css" />
    <link rel="stylesheet" href="/vendor/markercluster/MarkerCluster.css" />
    <link
      rel="stylesheet"
      href="/vendor/markercluster/MarkerCluster.Default.css"
    />
  </head>
  <body>
    <div id="app">
      <!-- ═══ SIDEBAR GAUCHE : en-tête fixe + recherche + type + cartes ═══ -->
      <aside id="sidebar">
        <header id="sidebar-header">
          <h1>CinéTour</h1>
          <p class="sous-titre">Lieux de tournage en Occitanie</p>

          <input
            type="search"
            id="recherche-input"
            placeholder="Chercher un film, une série…"
          />

          <div id="filtres">
            <button class="filtre-btn active" data-type="">Tout</button>
            <button class="filtre-btn" data-type="movie">Films</button>
            <button class="filtre-btn" data-type="tv">Séries</button>
          </div>

          <a href="/analyse.html" id="stats-toggle"
            >📊 Analyse territoriale complète</a
          >
        </header>

        <div id="cartes-scroll">
          <div id="cartes-liste"><!-- rempli par app.js --></div>
          <div id="cartes-loading" class="hidden">Chargement…</div>
          <div id="cartes-vide" class="hidden">
            Aucun résultat pour ces filtres.
          </div>
        </div>
      </aside>

      <!-- ═══ CARTE (à droite) ═══ -->
      <main id="carte-zone">
        <!-- Filtres avancés, en barre horizontale au-dessus de la carte —
             le zoom Leaflet est déplacé à droite (voir app.js) pour ne
             plus se chevaucher avec cette barre. -->
        <div id="filtres-carte">
          <select id="filtre-annee">
            <option value="">Année</option>
          </select>
          <select id="filtre-departement">
            <option value="">Département</option>
          </select>
          <select id="filtre-commune">
            <option value="">Commune</option>
          </select>
          <button id="filtre-notoriete" data-tri="titre">
            ⭐ Les plus connus
          </button>
        </div>

        <button
          id="btn-recentrer"
          class="hidden"
          title="Revenir à la vue initiale"
        >
          ⟲ Recentrer
        </button>

        <div id="calques-carte">
          <button id="btn-choroplethe" data-actif="false">
            🗺️ Départements
          </button>
          <button id="btn-chaleur" data-actif="false">
            🔥 Carte de chaleur
          </button>
        </div>

        <div id="map"></div>
      </main>
    </div>

    <!-- ═══ POPUP LIEU DE TOURNAGE ═══ -->
    <div id="popup-overlay" class="hidden">
      <div id="popup-lieu">
        <button id="popup-fermer" aria-label="Fermer">✕</button>
        <img id="popup-poster" src="" alt="" />
        <div id="popup-contenu">
          <h2 id="popup-titre"></h2>
          <p id="popup-meta"></p>
          <p id="popup-adresse"></p>

          <div id="popup-synopsis" class="scrollable"></div>
          <div id="popup-anecdote">
            <!-- rempli par app.js si disponible -->
          </div>
          <div id="popup-plateformes">
            <!-- logos streaming, rempli par app.js -->
          </div>

          <div id="popup-photos-lieu">
            <!-- photo actuelle du lieu, si dispo -->
          </div>

          <p class="popup-intro-visite">
            Vous voulez visiter ce lieu ? Voici ce qu'il vous faut savoir :
          </p>

          <div id="popup-boutons">
            <!-- rempli dynamiquement avec icônes/couleurs par app.js, activité incluse -->
          </div>

          <div id="popup-resultats"><!-- rempli au clic sur un bouton --></div>

          <div id="popup-actions-globales">
            <button id="btn-trace">🎬 Sur les traces de ce film…</button>
          </div>

          <div id="popup-pub-slot" class="pub-slot">
            <!-- Emplacement réservé — affiliation Awin (hébergement partenaire, location de voiture, etc.) -->
          </div>
        </div>
      </div>
    </div>

    <script src="/vendor/leaflet/leaflet.js"></script>
    <script src="/vendor/markercluster/leaflet.markercluster.js"></script>
    <script src="/vendor/leaflet-heat/leaflet-heat.js"></script>
    <script src="/vendor/turf/turf.min.js"></script>
    <script src="/app.js" defer></script>
  </body>
</html>
